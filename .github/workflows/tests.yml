name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fusion-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run rule-based fusion tests
        env:
          PYTHONPATH: Rule_Based_Fusion_Module/src
        run: python -m unittest discover -s Rule_Based_Fusion_Module/tests -v

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile project source
        run: python -m compileall -q cnn random_forest analysis data_tools
